<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de Bord Analytique</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- ECharts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header fixe -->
  <header class="main-header">
    <div class="header-branding">
      <img src="assets/snipers.png" alt="Logo snipers" class="header-logo">
      <div class="header-content">
        <h1>Tableau de Bord Analytique</h1>
        <p class="header-subtitle">Visualisation avancée des données temporelles</p>
      </div>
    </div>
<div class="header-controls">
      <button id="btn-add-section" class="btn btn-primary">+ Ajouter une section</button>
      <button id="btn-info" class="btn btn-secondary" title="Aide et informations">ℹ️ Aide</button>
      <button id="btn-export-backup" class="btn btn-secondary" title="Sauvegarder tout le dashboard">💾 Exporter Sauvegarde</button>
      <label class="btn btn-secondary" title="Restaurer une sauvegarde">
        📥 Importer Sauvegarde
        <input type="file" id="btn-import-backup" accept=".json" style="display:none">
      </label>
      <button id="btn-reset-all" class="btn btn-danger">Réinitialiser toutes les données</button>
      <span id="status-indicator" class="status-badge">Aucune donnée chargée</span>
    </div>
    <nav class="header-nav">
      <!-- Liens générés dynamiquement par JS -->
    </nav>
  </header>

  <main class="main-container">
    <!-- Toutes les sections sont générées dynamiquement ici -->
  </main>

<!-- Modal globale ajout / modification -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Ajouter une donnée</h3>
        <button class="modal-close" id="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Type</label>
          <select id="modal-type"></select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="modal-date">
        </div>
        <div class="form-group" id="modal-annonces-group" style="display:none;">
          <label>Colis annoncé</label>
          <input type="number" id="modal-annonces" min="0" value="0">
        </div>
        <div class="form-group" id="modal-flashe-group" style="display:none;">
          <label>Colis Flashé</label>
          <input type="number" id="modal-flashe" min="0" value="0">
        </div>
        <!-- Container for dynamic fields (custom sections) -->
        <div id="modal-dynamic-fields"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="modal-save">💾 Valider</button>
        <button class="btn btn-secondary" id="modal-cancel">❌ Annuler</button>
      </div>
    </div>
  </div>

  <!-- Modal création/édition de section -->
  <div id="modal-section-overlay" class="modal-overlay" style="display:none;">
    <div class="modal modal-section">
      <div class="modal-header">
        <h3 id="modal-section-title">Ajouter une section</h3>
        <button class="modal-close" id="modal-section-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Nom de la section</label>
          <input type="text" id="modal-section-name" placeholder="Ex: Performance Hebdomadaire">
        </div>
        <div class="form-group">
          <label>Type de graphique</label>
          <select id="modal-section-chart-type">
            <option value="line">📈 Ligne</option>
            <option value="bar">📊 Barres</option>
          </select>
        </div>
        <div class="form-group">
          <label>Champs de données</label>
          <div id="section-fields-container" class="section-fields-container">
            <!-- Champs dynamiques injectés par JS -->
          </div>
          <button type="button" id="btn-add-field" class="btn btn-secondary btn-sm">+ Ajouter un champ</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="modal-section-save">💾 Créer la section</button>
        <button class="btn btn-secondary" id="modal-section-cancel">❌ Annuler</button>
      </div>
    </div>
  </div>

  <!-- Template pour les champs dynamiques -->
  <template id="field-template">
    <div class="field-row">
      <input type="text" class="field-name" placeholder="Nom du champ" value="Valeur">
      <input type="number" class="field-value" placeholder="Valeur" min="0" value="0">
      <button type="button" class="btn-remove-field" title="Supprimer">&times;</button>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
